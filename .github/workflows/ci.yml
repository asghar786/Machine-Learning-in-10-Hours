name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  # ── Laravel backend tests ───────────────────────────────────────────────
  backend:
    name: Laravel Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ml_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, bcmath, gd, zip, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: cd backend && composer install --no-progress --no-interaction

      - name: Copy .env.testing
        run: |
          cd backend
          cp .env.example .env.testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=ml_testing/' .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env.testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing

      - name: Generate app key
        run: cd backend && php artisan key:generate --env=testing

      - name: Run migrations on test DB
        run: cd backend && php artisan migrate --env=testing --force

      - name: Run PHPUnit
        run: cd backend && php artisan test --env=testing

  # ── React frontend lint + build ─────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint --if-present

      - name: Build
        run: cd frontend && npm run build

  # ── ML service syntax check ─────────────────────────────────────────────
  ml-service:
    name: ML Service Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: cd ml-service && pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile ml-service/main.py ml-service/grader.py

      - name: FastAPI startup check
        run: |
          cd ml-service
          echo "ML_SERVICE_SECRET=test" > .env
          timeout 5 uvicorn main:app --port 8002 &
          sleep 3
          curl -sf http://localhost:8002/health || exit 1
          echo "Health check passed"
