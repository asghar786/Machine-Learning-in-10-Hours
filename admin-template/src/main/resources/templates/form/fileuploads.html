<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">
    <link rel="stylesheet" href="/vendor/dropzone/dropzone.css">
</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('File Uploads')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Forms', 'File Uploads')}"></th:block>
    <div class="card">
        <div class="card-header border-bottom border-dashed d-flex align-items-center">
            <h4 class="header-title">Dropzone File Upload</h4>
        </div>
        <div class="card-body">
            <p class="text-muted">
                DropzoneJS is an open source library that provides drag’n’drop file uploads with image previews.
            </p>
            <form action="/" class="dropzone" data-plugin="dropzone" data-previews-container="#file-previews"
                  data-upload-preview-template="#uploadPreviewTemplate" id="myAwesomeDropzone" method="post">
                <div class="fallback">
                    <input multiple="" name="file" type="file"/>
                </div>
                <div class="dz-message needsclick">
                    <i class="ti ti-cloud-upload h1 text-muted"></i>
                    <h3>Drop files here or click to upload.</h3>
                    <span class="text-muted fs-13">(This is just a demo dropzone. Selected files are
                                    <strong>not</strong> actually uploaded.)</span>
                </div>
            </form>
            <!-- Preview -->
            <div class="dropzone-previews mt-3" id="file-previews"></div>
        </div>
        <!-- end card-body -->
    </div>
    <!-- end card-->
    <!-- file preview template -->
    <div class="d-none" id="uploadPreviewTemplate">
        <div class="card mt-1 mb-0 shadow-none border">
            <div class="p-2">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <img alt="" class="avatar-sm rounded bg-light" data-dz-thumbnail="" src="#"/>
                    </div>
                    <div class="col ps-0">
                        <a class="text-muted fw-medium" data-dz-name="" href="javascript:void(0);"></a>
                        <p class="mb-0" data-dz-size=""></p>
                    </div>
                    <div class="col-auto">
                        <!-- Button -->
                        <a class="btn btn-link btn-lg text-muted" data-dz-remove="" href="">
                            <i class="ti ti-x"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/dropzone/dropzone-min.js"></script>
    <script src="/js/components/form-fileupload.js"></script>
</th:block>
</body>

</html>
