<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('Leaflet Maps')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Maps', 'Leaflet Maps')}"></th:block>
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">Basic Map</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="basicMap"></div>
                </div>
            </div> <!-- end card-->
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">Marker Circle & Polygon</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="shapeMap"></div>
                </div>
            </div> <!-- end card-->
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">Draggable Marker With Popup</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="dragMap"></div>
                </div>
            </div> <!-- end card-->
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">User Location</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="userLocation"></div>
                </div>
            </div> <!-- end card-->
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">Custom Icons</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="customIcons"></div>
                </div>
            </div> <!-- end card-->
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">Layer Control</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="layerControl"></div>
                </div>
            </div> <!-- end card-->
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header border-bottom border-dashed d-flex align-items-center">
                    <h4 class="header-title">Interactive Choropleth Map</h4>
                </div>
                <div class="card-body">
                    <div class="leaflet-map" id="geoJson"></div>
                </div>
            </div> <!-- end card-->
        </div>
    </div>
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/leaflet/leaflet.js"></script>
    <script src="/js/maps/leaflet-data.js"></script>
    <script src="/js/components/maps-leaflet.js"></script>
</th:block>
</body>

</html>
