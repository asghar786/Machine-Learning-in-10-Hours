<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">
    <link rel="stylesheet" href="/vendor/jsvectormap/jsvectormap.min.css">
</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('Vector Maps')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Maps', 'Vector Maps')}"></th:block>
    <div class="row">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">World Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="world-map-markers" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">World Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="world-map-markers-line" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">India Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="india-vector-map" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">Canada Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="canada-vector-map" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">Russia Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="russia-vector-map" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">US Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="usa-vector-map" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">Iraq Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="iraq-vector-map" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header border-0 border-bottom border-dashed">
                    <h4 class="header-title">Spain Vector Map</h4>
                </div>
                <div class="card-body">
                    <div id="spain-vector-map" style="height: 360px"></div>
                </div> <!-- end card-body-->
            </div> <!-- card end -->
        </div>
    </div>
    <!-- end row -->
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/jsvectormap/jsvectormap.min.js"></script>
    <script src="/vendor/jsvectormap/maps/world-merc.js"></script>
    <script src="/vendor/jsvectormap/maps/world.js"></script>
    <script src="/js/maps/in-mill-en.js"></script>
    <script src="/js/maps/canada.js"></script>
    <script src="/js/maps/iraq.js"></script>
    <script src="/js/maps/russia.js"></script>
    <script src="/js/maps/spain.js"></script>
    <script src="/js/maps/us-aea-en.js"></script>
    <script src="/js/maps/us-lcc-en.js"></script>
    <script src="/js/maps/us-mill-en.js"></script>
    <script src="/js/components/maps-vector.js"></script>
</th:block>
</body>

</html>
