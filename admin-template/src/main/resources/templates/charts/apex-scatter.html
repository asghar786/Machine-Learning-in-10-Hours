<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">

</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('Apex Scatter Charts')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Apex', 'Scatter Charts')}"></th:block>
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Scatter (XY) Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#39afd1,#fbcc5c,#6b5eae" id="basic-scatter"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Scatter Chart - Datetime</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#35b8e0,#fbcc5c,#6b5eae,#31ce77,#fa5c7c"
                             id="datetime-scatter"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Scatter - Images</h4>
                    <div dir="ltr">
                        <div class="apex-charts scatter-images-chart" data-colors="#3b5998,#e1306c"
                             id="scatter-images"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/apexcharts/apexcharts.min.js"></script>
    <script src="/js/components/chart-apex-scatter.js"></script>
</th:block>
</body>

</html>
