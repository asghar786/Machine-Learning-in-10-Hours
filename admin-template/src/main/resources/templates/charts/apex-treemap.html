<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">

</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('Apex Treemap Charts')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Apex', 'Treemap Charts')}"></th:block>
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Basic Treemap</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#39afd1" id="basic-treemap"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Treemap Multiple Series</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#fa5c7c,#35b8e0" id="multiple-treemap"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Distributed Treemap</h4>
                    <div dir="ltr">
                        <div class="apex-charts"
                             data-colors="#6b5eae,#31ce77,#fa5c7c,#35b8e0,#39afd1,#ffc35a, #eef2f7, #313a46"
                             id="distributed-treemap"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Color Range Treemap</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#6b5eae,#39afd1" id="color-range-treemap"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/apexcharts/apexcharts.min.js"></script>
    <script src="/js/components/chart-apex-treemap.js"></script>
</th:block>
</body>

</html>
