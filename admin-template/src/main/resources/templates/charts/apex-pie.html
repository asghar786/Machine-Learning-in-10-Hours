<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">

</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('Apex Pie Charts')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Apex', 'Pie Charts')}"></th:block>
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Simple Pie Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#6b5eae,#35b8e0,#31ce77,#fa5c7c,#e3eaef"
                             id="simple-pie"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title">Simple Donut Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#39afd1,#fbcc5c,#313a46,#fa5c7c,#31ce77"
                             id="simple-donut"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Monochrome Pie Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" id="monochrome-pie"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Gradient Donut Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#6b5eae,#35b8e0,#31ce77,#fa5c7c,#e3eaef"
                             id="gradient-donut"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Patterned Donut Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#39afd1,#fbcc5c,#313a46,#fa5c7c,#31ce77"
                             id="patterned-donut"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Pie Chart with Image fill</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#39afd1,#fbcc5c,#6b5eae,#31ce77" id="image-pie"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Donut Update</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#6b5eae,#35b8e0,#31ce77,#fa5c7c" id="update-donut"></div>
                    </div>
                    <div class="text-center mt-2">
                        <button class="btn btn-sm btn-primary" id="randomize">RANDOMIZE</button>
                        <button class="btn btn-sm btn-primary" id="add">ADD</button>
                        <button class="btn btn-sm btn-primary" id="remove">REMOVE</button>
                        <button class="btn btn-sm btn-primary" id="reset">RESET</button>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/apexcharts/apexcharts.min.js"></script>
    <script src="/js/components/chart-apex-pie.js"></script>
</th:block>
</body>

</html>
