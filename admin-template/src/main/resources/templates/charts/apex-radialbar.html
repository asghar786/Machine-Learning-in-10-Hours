<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/vertical}">

<th:block layout:fragment="styles">

</th:block>

<head>
    <th:block layout:fragment="title-meta" th:replace="~{partials/title-meta :: title-meta('Apex RadialBar Charts')}"/>
</head>

<body>
<th:block layout:fragment="content">
    <th:block th:replace="~{partials/page-title :: page-title('Apex', 'RadialBar Charts')}"></th:block>
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Basic RadialBar Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#39afd1" id="basic-radialbar"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Multiple RadialBars</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#35b8e0,#fbcc5c,#6b5eae,#31ce77"
                             id="multiple-radialbar"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Circle Chart - Custom Angle</h4>
                    <div class="text-center" dir="ltr">
                        <div class="apex-charts" data-colors="#31ce77,#6b5eae,#fa5c7c,#fbcc5c"
                             id="circle-angle-radial"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Circle Chart with Image</h4>
                    <div dir="ltr">
                        <div class="apex-charts" id="image-radial"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Stroked Circular Guage</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#6b5eae" id="stroked-guage-radial"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Gradient Circular Chart</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#8f75da,#6b5eae" id="gradient-chart"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
    <div class="row">
        <div class="col-xl-6">
            <div class="card">
                <div class="card-body">
                    <h4 class="header-title mb-4">Semi Circle Gauge</h4>
                    <div dir="ltr">
                        <div class="apex-charts" data-colors="#6b5eae" id="semi-circle-gauge"></div>
                    </div>
                </div>
                <!-- end card body-->
            </div>
            <!-- end card -->
        </div>
        <!-- end col-->
    </div>
    <!-- end row-->
</th:block>

<th:block layout:fragment="javascripts">
    <script src="/vendor/apexcharts/apexcharts.min.js"></script>
    <script src="/js/components/chart-apex-radialbar.js"></script>
</th:block>
</body>

</html>
