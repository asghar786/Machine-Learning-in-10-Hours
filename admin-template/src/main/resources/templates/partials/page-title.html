<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="page-title(title, subtitle)">

    <div th:if="${title}">
        <div class="page-title-head d-flex align-items-center gap-2">
            <div class="flex-grow-1">
                <h4 class="fs-16 text-uppercase fw-bold mb-0" th:text="${title}">title</h4>
            </div>
            <div class="text-end">
                <ol class="breadcrumb m-0 py-0 fs-13">
                    <li class="breadcrumb-item"><a href="javascript: void(0);">Greeva</a></li>
                    <li class="breadcrumb-item" th:if="${subtitle != null and !#strings.isEmpty(subtitle)}"
                        th:text="${subtitle}"><a href="javascript: void(0);">subtitle</a></li>
                    <li class="breadcrumb-item active" th:text="${title}">title</li>
                </ol>
            </div>
        </div>
    </div>

    <div th:unless="${title}">
        <div class="page-title-head d-flex align-items-center">
            <h4 class="fs-16 text-uppercase fw-bold mb-0">Welcome</h4>
        </div>
    </div>

</th:block>

</html>
